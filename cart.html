<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart &amp; Checkout</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 28px; align-items: start; }
    @media (max-width: 900px) { .cart-layout { grid-template-columns: 1fr; } }
    .sticky-sidebar { position: sticky; top: calc(var(--nav-h) + 20px); }

    .cart-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .cart-section-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-section-header h2 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
    }

    .cart-item { grid-template-columns: 1fr 140px 80px 30px; }

    .success-screen {
      text-align: center;
      padding: 60px 20px;
      animation: fadeUp 0.4s ease;
    }
    .success-icon {
      width: 72px; height: 72px;
      background: var(--green-bg);
      border: 2px solid var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
    }
    .success-screen h2 {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
    }
    .success-screen p { color: var(--text2); font-size: 15px; }
    .order-id-badge {
      display: inline-block;
      background: var(--accent-bg2);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 8px;
      margin: 16px 0;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">📦 InvTrack</a>
  <a class="nav-link" href="index.html">Catalog</a>
  <a class="nav-link" href="sales.html">Order</a>
  <a class="nav-link" href="admin.html">Admin</a>
  <a class="nav-cart-btn active" href="cart.html">
    🛒 Cart
    <span class="nav-cart-count" id="cart-count" style="display:none">0</span>
  </a>
</nav>

<main id="main-content">
  <div class="page-header">
    <h1>Cart &amp; Checkout</h1>
    <p>Review your order, adjust quantities, and confirm.</p>
  </div>

  <div class="cart-layout">
    <!-- LEFT: Cart items -->
    <div>
      <div class="cart-section">
        <div class="cart-section-header">
          <h2>Order Items</h2>
          <button class="btn btn-danger" style="padding:6px 14px;font-size:12px;" onclick="confirmClear()">🗑 Clear all</button>
        </div>
        <div id="cart-items-container"></div>
      </div>

      <!-- Note -->
      <div style="margin-top:20px;">
        <label style="font-size:13px;font-weight:500;color:var(--text2);display:block;margin-bottom:8px;">Order note (optional)</label>
        <textarea id="order-note" class="form-control" placeholder="Any special instructions, delivery details…" style="height:80px;"></textarea>
      </div>
    </div>

    <!-- RIGHT: Summary -->
    <div class="sticky-sidebar">
      <div class="order-summary">
        <h3 style="font-family:var(--font-head);font-size:17px;font-weight:700;margin-bottom:20px;">Order Summary</h3>

        <div class="summary-row">
          <span>Items (<span id="item-count">0</span>)</span>
          <span id="subtotal-amt">₹0.00</span>
        </div>
        <div class="summary-row" id="tax-row">
          <span id="tax-label">GST (18%)</span>
          <span id="tax-amt">₹0.00</span>
        </div>

        <div class="summary-total">
          <span class="label">Total</span>
          <span class="amount" id="grand-total">₹0.00</span>
        </div>

        <button class="btn btn-success btn-full btn-lg" style="margin-top:20px;" id="place-order-btn" onclick="placeOrder()">
          ✓ Confirm Order
        </button>

        <a href="sales.html" class="btn btn-secondary btn-full" style="margin-top:10px;justify-content:center;">
          ← Continue Shopping
        </a>
      </div>

      <!-- Item breakdown -->
      <div style="margin-top:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;">
        <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;">Item Breakdown</div>
        <div id="breakdown-list"></div>
      </div>
    </div>
  </div>
</main>

<!-- Confirm clear modal -->
<div id="clear-modal" class="modal-overlay" style="display:none;">
  <div class="modal" style="max-width:360px;">
    <h2>Clear cart?</h2>
    <p style="color:var(--text2);font-size:14px;">All items will be removed. This cannot be undone.</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('clear-modal').style.display='none'">Cancel</button>
      <button class="btn btn-danger" onclick="doClear()">Clear cart</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script>
  function render() {
    const items = Cart.get();
    const container = document.getElementById('cart-items-container');

    if (!items.length) {
      container.innerHTML = `
        <div class="empty-state" style="padding:48px 20px;">
          <div style="font-size:48px;margin-bottom:16px;">🛒</div>
          <h3>Your cart is empty</h3>
          <p>Head to the <a href="sales.html" style="color:var(--accent)">Order page</a> to add items.</p>
        </div>`;
      document.getElementById('place-order-btn').disabled = true;
      document.getElementById('place-order-btn').style.opacity = '0.4';
      updateTotals(items);
      updateBreakdown(items);
      return;
    }

    document.getElementById('place-order-btn').disabled = false;
    document.getElementById('place-order-btn').style.opacity = '1';

    container.innerHTML = items.map(item => `
      <div class="cart-item">
        <div>
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-sku">${item.sku} · ${item.category || ''}</div>
        </div>
        <div class="cart-item-price" style="display:flex;align-items:center;gap:6px;">
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${item.sku}', ${item.qty - 1})">−</button>
            <span class="qty-input" style="display:flex;align-items:center;justify-content:center;">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.sku}', ${item.qty + 1})">+</button>
          </div>
          <span style="font-size:12px;color:var(--text3);">@ ${fmt(item.price)}</span>
        </div>
        <div class="cart-item-total">${fmt(item.price * item.qty)}</div>
        <button class="remove-btn" onclick="removeItem('${item.sku}')" title="Remove">×</button>
      </div>`).join('');

    updateTotals(items);
    updateBreakdown(items);
  }

  function updateTotals(items) {
    const subtotal = Cart.subtotal();
    const tax = subtotal * APP_CONFIG.TAX_RATE;
    const total = subtotal + tax;
    const count = Cart.count();

    document.getElementById('item-count').textContent = count;
    document.getElementById('subtotal-amt').textContent = fmt(subtotal);
    document.getElementById('tax-label').textContent = APP_CONFIG.TAX_LABEL;
    document.getElementById('tax-amt').textContent = fmt(tax);
    document.getElementById('grand-total').textContent = fmt(total);

    if (APP_CONFIG.TAX_RATE === 0) {
      document.getElementById('tax-row').style.display = 'none';
    }
  }

  function updateBreakdown(items) {
    const el = document.getElementById('breakdown-list');
    if (!items.length) { el.innerHTML = ''; return; }
    el.innerHTML = items.map(item => `
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text2);">
        <span>${item.name} <span style="color:var(--text3);">×${item.qty}</span></span>
        <span style="font-weight:600;color:var(--text);">${fmt(item.price * item.qty)}</span>
      </div>`).join('');
  }

  function changeQty(sku, newQty) {
    const item = Cart.get().find(i => i.sku === sku);
    if (!item) return;
    if (newQty > item.stock) { toast(`Only ${item.stock} in stock`, 'error'); return; }
    Cart.updateQty(sku, newQty);
    render();
  }

  function removeItem(sku) {
    Cart.remove(sku);
    render();
    toast('Item removed', 'error');
  }

  function confirmClear() {
    document.getElementById('clear-modal').style.display = 'flex';
  }

  function doClear() {
    Cart.clear();
    document.getElementById('clear-modal').style.display = 'none';
    render();
    toast('Cart cleared', 'error');
  }

  async function placeOrder() {
    const items = Cart.get();
    if (!items.length) return;

    const btn = document.getElementById('place-order-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Placing order…';

    const note = document.getElementById('order-note').value;
    const subtotal = Cart.subtotal();
    const tax = subtotal * APP_CONFIG.TAX_RATE;
    const total = subtotal + tax;

    try {
      const result = await API.placeOrder(
        items.map(i => ({ sku: i.sku, name: i.name, qty: i.qty, price: i.price })),
        note
      );

      if (result.success) {
        Cart.clear();
        showSuccess(result.orderId || 'ORD-' + Date.now(), total);
      } else {
        throw new Error(result.error || 'Order failed');
      }
    } catch (e) {
      toast('Failed to place order: ' + e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '✓ Confirm Order';
    }
  }

  function showSuccess(orderId, total) {
    document.getElementById('main-content').innerHTML = `
      <div class="success-screen">
        <div class="success-icon">✓</div>
        <h2>Order Confirmed!</h2>
        <p>Your order has been placed and inventory updated.</p>
        <div class="order-id-badge">${orderId}</div>
        <p style="font-size:22px;font-family:var(--font-head);font-weight:800;color:var(--accent);margin:16px 0;">${fmt(total)}</p>
        <p style="color:var(--text3);font-size:13px;">Total including taxes</p>
        <div style="display:flex;gap:12px;justify-content:center;margin-top:32px;flex-wrap:wrap;">
          <a href="sales.html" class="btn btn-primary btn-lg">Place another order</a>
          <a href="index.html" class="btn btn-secondary btn-lg">Back to catalog</a>
        </div>
      </div>`;
  }

  window.addEventListener('cartUpdated', render);
  render();
</script>
</body>
</html>
